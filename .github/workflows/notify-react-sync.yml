name: Notify ichigojam-react

# web/ (または core/) の更新を Shiyo1101/ichigojam-react に repository_dispatch で
# 即時通知する。実際の wasm ビルド・同期・PR 作成は ichigojam-react 側の
# .github/workflows/sync-wasm.yml が行う。

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "core/**"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync-wasm in ichigojam-react
        env:
          GH_TOKEN: ${{ secrets.REACT_REPO_DISPATCH_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Shiyo1101/ichigojam-react/dispatches \
            -d "{\"event_type\":\"sync-wasm\",\"client_payload\":{\"sha\":\"${SHA}\"}}"
