<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IchigoJam-RS (wasm)</title>
    <style>
      body {
        background: #111;
        color: #ccc;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 24px;
      }
      /* 論理 256x192 を 3 倍に拡大。ドットを保つため pixelated。 */
      #screen {
        width: 768px;
        height: 576px;
        image-rendering: pixelated;
        background: #000;
        border: 8px solid #333;
        outline: none;
      }
      p {
        max-width: 768px;
        font-size: 13px;
        line-height: 1.6;
      }
      kbd {
        background: #333;
        border-radius: 4px;
        padding: 1px 5px;
      }
    </style>
  </head>
  <body>
    <h1>IchigoJam-RS (WebAssembly)</h1>
    <!-- tabindex でフォーカス可能にし、キーイベントを canvas に集約する。 -->
    <canvas id="screen" tabindex="0"></canvas>
    <!-- onPrint で受け取った画面出力ストリーム。 -->
    <pre id="log" style="width:752px;height:120px;overflow:auto;background:#000;border:8px solid #333;color:#7f7;margin:0;padding:4px;font-size:12px"></pre>
    <p>
      クリックでフォーカスしてからタイプして下さい。例:
      <kbd>PRINT "HELLO"</kbd> → <kbd>Enter</kbd>、<kbd>F5</kbd> で RUN。
      行番号付きで <kbd>10 PRINT "HI"</kbd> / <kbd>20 GOTO 10</kbd> と打ち
      <kbd>F5</kbd>、<kbd>ESC</kbd> で中断。
    </p>

    <script type="module" src="./main.js"></script>
  </body>
</html>
